; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
build_dir = ${sysenv.HOME}/pio-build/uroflow

[env:esp32-s3-touch-lcd-7]
platform = espressif32@^6.0.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_8MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.f_flash = 80000000L
board_build.f_psram = 80000000L
board_build.flash_mode = qio
board_build.f_cpu = 240000000L
upload_protocol = esptool
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DBOARD_HAS_PSRAM
	-DGT911_DRIVER=1
	-DTFT_WIDTH=800
	-DTFT_HEIGHT=480
	-DCONFIG_ESP32S3_DATA_CACHE_LINE_64B=y
lib_deps = 
	h2zero/NimBLE-Arduino @ ^1.4.2
	milad-nikpendar/initGT911 @ ^1.0.0
	moononournation/GFX Library for Arduino @ ^1.5.6
